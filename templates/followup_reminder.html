<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow-up Reminder</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#0284c7);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.title{
    text-align:center;
    color:#2563eb;
    font-size:38px;
    font-weight:700;
    margin-bottom:35px;
}

.info-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.box{
    background:#f8fafc;
    border-left:6px solid #2563eb;
    padding:25px;
    border-radius:15px;
    transition:0.3s;
}

.box:hover{
    transform:translateY(-5px);
}

.label{
    font-size:15px;
    color:#64748b;
    margin-bottom:10px;
}

.value{
    font-size:20px;
    font-weight:600;
    color:#111827;
}

.reminder{
    margin-top:30px;
    background:#dcfce7;
    color:#166534;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

.no-record{
    background:#fee2e2;
    color:#991b1b;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:18px;
}

.btn{
    display:block;
    width:250px;
    margin:30px auto 0;
    text-align:center;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:12px;
    font-size:17px;
    font-weight:600;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1 class="title">📅 Follow-up Reminder</h1>

{% if scan_date %}

<div class="info-box">

    <div class="box">
        <div class="label">Last Scan Date</div>
        <div class="value">{{ scan_date }}</div>
    </div>

    <div class="box">
        <div class="label">Diagnosis</div>
        <div class="value">{{ diagnosis }}</div>
    </div>

    <div class="box">
        <div class="label">Next Checkup Date</div>
        <div class="value">{{ next_visit }}</div>
    </div>

</div>

<div class="reminder">
    🔔 Please schedule your next retina examination before the next checkup date.
</div>

{% else %}

<div class="no-record">
    ❌ No scan history found.
</div>

{% endif %}

<a href="/patientDashboard" class="btn">
    ← Back to Dashboard
    <a href="/send_reminder_email" class="btn">
    📧 Send Reminder Email
</a>
</a>

</div>

</div>

</body>
</html>
