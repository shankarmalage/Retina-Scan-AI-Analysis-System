<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETINEX Doctor Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#0891b2);
}

.container{
    width:850px;
    max-width:95%;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    background:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.left{
    width:45%;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    padding:40px;
}

.logo{
    width:80px;
    height:80px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    margin-bottom:25px;
}

.left h1{
    font-size:42px;
    line-height:1.2;
    margin-bottom:15px;
}

.left p{
    color:#dbeafe;
    line-height:1.8;
    margin-bottom:25px;
}

.feature{
    margin-top:15px;
    font-size:16px;
}

.right{
    width:55%;
    padding:40px;
}

.icon{
    text-align:center;
    font-size:50px;
}

.right h2{
    text-align:center;
    font-size:38px;
    color:#0f172a;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:25px;
}

label{
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    background:#f1f5f9;
    border-radius:12px;
    margin-bottom:15px;
    font-size:15px;
}

input:focus{
    outline:none;
    box-shadow:0 0 10px rgba(37,99,235,0.3);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}

.login-link{
    text-align:center;
    margin-top:18px;
}

.login-link a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
    font-size:13px;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.left,
.right{
    width:100%;
}

.left h1{
    font-size:32px;
}

}

</style>
</head>

<body>

<div class="container">

    <div class="left">

        <div class="logo">👁️</div>

        <h1>Join RETINEX AI</h1>

        <p>
            Create your doctor account and access AI-powered diabetic retinopathy detection.
        </p>

        <div class="feature">✅ AI Retina Detection</div>
        <div class="feature">✅ Fast Medical Reports</div>
        <div class="feature">✅ Secure Doctor Access</div>

    </div>

    <div class="right">

        <div class="icon">👨‍⚕️</div>

        <h2>Register</h2>

        <p class="subtitle">
            Create your doctor account
        </p>

        <form method="POST">

            <label>Doctor Name</label>
            <input type="text"
                   name="doctor_name"
                   placeholder="Enter Doctor Name"
                   required>

            <label>Email Address</label>
            <input type="email"
                   name="email"
                   placeholder="Enter Email Address"
                   required>

            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit" class="btn">
                Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/doctor_login">Login</a>
        </div>

        <div class="footer">
            RETINEX AI - Doctor Portal
        </div>

    </div>

</div>

</body>
</html>
