<!DOCTYPE html>
<html>
<head>
    <title>Prescription Saved</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#0284c7);
        }

        .card{
            background:white;
            padding:50px;
            border-radius:25px;
            text-align:center;
            width:600px;
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        .icon{
            font-size:80px;
            margin-bottom:20px;
        }

        h1{
            color:#16a34a;
            margin-bottom:15px;
        }

        p{
            color:#64748b;
            font-size:18px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:14px 30px;
            border-radius:12px;
            font-weight:bold;
        }

        .btn:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<div class="card">

    <div class="icon">💊</div>

    <h1>Prescription Saved Successfully!</h1>

    <p>
        The prescription has been stored in the database.
    </p>

    <a href="/prescriptions" class="btn">
        Add Another Prescription
    </a>

</div>

</body>
</html>
